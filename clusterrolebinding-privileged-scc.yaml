# Grants the privileged SCC to the default service account in node-exporter-zoneinfo.
# Equivalent to: oc adm policy add-scc-to-user privileged -z default -n node-exporter-zoneinfo
# Required for the node-exporter-zoneinfo DaemonSet when it uses hostPID, hostPath.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-exporter-zoneinfo-privileged-scc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: default
    namespace: node-exporter-zoneinfo
