# Supplementary node_exporter (zoneinfo, interrupts, softirqs) for cluster Prometheus.
# DaemonSet/Service/ServiceMonitor deploy into openshift-monitoring (see metadata.namespace in each file).
# Check pods: oc get pods -n openshift-monitoring -l app.kubernetes.io/name=node-exporter-zoneinfo
# Includes ClusterRoleBinding to grant privileged SCC to default SA (for hostPID/hostPath).
# Usage: oc apply -k abi-master-0/extra-manifests/node-exporter-zoneinfo/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - clusterrolebinding-privileged-scc.yaml
  # Choose ONE daemonset variant:
  # - daemonset.yaml (default): all collectors enabled (zoneinfo, interrupts, softirqs)
  # - daemonset-rootless.yaml: rootless variant with all collectors
  # - daemonset-zoneinfo-only.yaml: only zoneinfo collector
  # - daemonset-interrupts-only.yaml: only interrupts collector
  # - daemonset-softirqs-only.yaml: only softirqs collector
  # - daemonset.yaml
  # - daemonset-rootless.yaml
  # - daemonset-zoneinfo-only.yaml
  - daemonset-interrupts-only.yaml
  # - daemonset-softirqs-only.yaml
  - service.yaml
  - servicemonitor.yaml
